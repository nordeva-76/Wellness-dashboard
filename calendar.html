<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness Calendar</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <h1>🗓️ Wellness Calendar</h1>
    <p>Track every day. Build every habit.</p>
</header>

<main>

<section class="card">

<div class="calendar">

  <div class="calendar-header">July 2026</div>

  <div class="weekdays">
    <div>Sun</div>
    <div>Mon</div>
    <div>Tue</div>
    <div>Wed</div>
    <div>Thu</div>
    <div>Fri</div>
    <div>Sat</div>
  </div>

  <div class="days">
    <div class="day empty"></div>
    <div class="day empty"></div>
    <div class="day empty"></div>
<div class="day" contenteditable="true">1</div>
<div class="day" contenteditable="true">2</div>
<div class="day" contenteditable="true">3</div>
<div class="day" contenteditable="true">4</div>
<div class="day" contenteditable="true">5</div>
<div class="day" contenteditable="true">6</div>
<div class="day" contenteditable="true">7</div>
<div class="day" contenteditable="true">8</div>
<div class="day" contenteditable="true">9</div>
<div class="day" contenteditable="true">10</div>
<div class="day" contenteditable="true">11</div>
<div class="day" contenteditable="true">12</div>
  <div class="day" contenteditable="true">13/div>
    <div class="day" contenteditable="true">14</div>
   <div class="day" contenteditable="true">15/div>
    <<div class="day" contenteditable="true">16</div>
    <div class="day" contenteditable="true">17</div>
   <div class="day" contenteditable="true"18</div>
    <<div class="day" contenteditable="true">19</div>

    <div class="day" contenteditable="true">20</div>
    <div class="day" contenteditable="true">21</div>
    <div class="day" contenteditable="true"22</div>
    <div class="day">22</div>
    <div class="day">23</div>
    <div class="day">24</div>
    <div class="day">25</div>

    <div class="day">26</div>
    <div class="day">27</div>
    <div class="day">28</div>
    <div class="day">29</div>
    <div class="day">30</div>
    <div class="day">31</div>
  </div>

</div>

</section>

</main>

<script>
const days = document.querySelectorAll(".day");

days.forEach((day, index) => {
    const saved = localStorage.getItem("wellness-day-" + index);

    if (saved) {
        day.innerHTML = saved;
    }

    day.addEventListener("input", () => {
        localStorage.setItem(
            "wellness-day-" + index,
            day.innerHTML
        );
    });
});
</script>
</body>
</html>
